<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users — Nature Dispatch TMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div id="app"></div>

  <!-- User Modal -->
  <div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="userModalTitle">New User</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="userForm">
            <input type="hidden" id="userRecordId">
            <div class="row g-3">

              <div class="col-md-6">
                <label class="form-label">Full Name *</label>
                <input type="text" class="form-control" id="userName" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Email *</label>
                <input type="email" class="form-control" id="userEmail" required>
              </div>

              <div class="col-md-6">
                <label class="form-label">Password *</label>
                <div class="input-group">
                  <input type="password" class="form-control" id="userPassword" required minlength="4">
                  <button class="btn btn-outline-secondary" type="button" id="togglePasswordBtn" title="Show/Hide">
                    <i class="bi bi-eye"></i>
                  </button>
                </div>
                <div class="form-text" id="passwordHint">Min 4 characters</div>
              </div>

              <div class="col-md-3">
                <label class="form-label">Role *</label>
                <select class="form-select" id="userRole" required>
                  <option value="Admin">Admin</option>
                  <option value="Dispatcher" selected>Dispatcher</option>
                  <option value="Driver">Driver</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label">Status</label>
                <select class="form-select" id="userStatus">
                  <option value="Active" selected>Active</option>
                  <option value="Inactive">Inactive</option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label">Company</label>
                <select class="form-select" id="userCompany">
                  <option value="">All Companies</option>
                </select>
              </div>

              <!-- Permissions Grid -->
              <div class="col-12">
                <label class="form-label fw-semibold">Page Permissions</label>
                <p class="text-muted mb-2" style="font-size:.78rem">Auto-filled based on role. Customize as needed.</p>
                <div class="row g-2" id="permGrid"></div>
              </div>

            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-nd" id="saveUserBtn"><i class="bi bi-check-lg me-1"></i>Save User</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/airtable.js"></script>
  <script src="js/app.js"></script>
  <script src="js/users.js"></script>
</body>
</html>
