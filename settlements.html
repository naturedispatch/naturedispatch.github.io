<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settlements — Nature Dispatch TMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div id="app"></div>

  <!-- Settlement Modal -->
  <div class="modal fade" id="settlementModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="settlementModalTitle">New Settlement</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="settlementForm">
            <input type="hidden" id="settlementRecordId">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Week Ending *</label>
                <input type="date" class="form-control" id="settlementWeekEnding" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Driver *</label>
                <select class="form-select" id="settlementDriver" required><option value="">Select…</option></select>
              </div>
            </div>
          </form>
          <hr>
          <p class="text-muted small mb-1">The fields below are calculated automatically from linked Loads, Fuel, Tolls &amp; Expenses in Airtable.</p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-nd" id="saveSettlementBtn"><i class="bi bi-check-lg me-1"></i>Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Settlement Detail Modal -->
  <div class="modal fade" id="settlementDetailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="settlementDetailTitle">Settlement Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="settlementDetailBody">
          <div class="text-center py-4"><div class="spinner-border"></div></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/airtable.js"></script>
  <script src="js/app.js"></script>
  <script src="js/csv.js"></script>
  <script src="js/settlements.js"></script>
</body>
</html>
