<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expenses — Nature Dispatch TMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div id="app"></div>

  <!-- Expense Modal -->
  <div class="modal fade" id="expenseModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="expenseModalTitle">New Expense</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="expenseForm">
            <input type="hidden" id="expRecordId">
            <div class="mb-3">
              <label class="form-label">Category *</label>
              <select class="form-select" id="expCategory" required>
                <option value="Fuel">Fuel</option>
                <option value="Toll">Toll</option>
                <option value="Maintenance">Maintenance</option>
                <option value="Insurance">Insurance</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Amount ($) *</label>
              <input type="number" step="0.01" class="form-control" id="expAmount" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Date</label>
              <input type="date" class="form-control" id="expDate">
            </div>
            <div class="mb-3">
              <label class="form-label">Truck</label>
              <select class="form-select" id="expTruck"><option value="">Select…</option></select>
            </div>
            <!-- Fuel-only: Gallons -->
            <div class="mb-3" id="grpGallons">
              <label class="form-label">Gallons</label>
              <input type="number" step="0.01" class="form-control" id="expGallons">
            </div>
            <!-- Toll-only: Location/Plaza -->
            <div class="mb-3" id="grpLocation" style="display:none">
              <label class="form-label">Location / Plaza</label>
              <input type="text" class="form-control" id="expLocation">
            </div>
            <!-- Expenses-only: Expense Name & Driver -->
            <div class="mb-3" id="grpExpName" style="display:none">
              <label class="form-label">Expense Name</label>
              <input type="text" class="form-control" id="expExpName">
            </div>
            <div class="mb-3" id="grpDriver" style="display:none">
              <label class="form-label">Driver</label>
              <select class="form-select" id="expDriver"><option value="">Select…</option></select>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-nd" id="saveExpenseBtn"><i class="bi bi-check-lg me-1"></i>Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/airtable.js"></script>
  <script src="js/app.js"></script>
  <script src="js/csv.js"></script>
  <script src="js/expenses.js"></script>
</body>
</html>
