<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alerts — Nature Dispatch TMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div id="app"></div>

  <!-- Create / Edit Alert Modal -->
  <div class="modal fade" id="alertModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="alertModalTitle">New Alert</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="alertForm">
            <input type="hidden" id="alertRecordId">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Title *</label>
                <input type="text" class="form-control" id="alertTitle" required>
              </div>
              <div class="col-md-3">
                <label class="form-label">Type</label>
                <select class="form-select" id="alertType">
                  <option value="ETA Delay">ETA Delay</option>
                  <option value="Missing Document">Missing Document</option>
                  <option value="Overdue Invoice">Overdue Invoice</option>
                  <option value="Driver Unavailable">Driver Unavailable</option>
                  <option value="General">General</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label">Priority</label>
                <select class="form-select" id="alertPriority">
                  <option value="Low">Low</option>
                  <option value="Medium" selected>Medium</option>
                  <option value="High">High</option>
                  <option value="Critical">Critical</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Status</label>
                <select class="form-select" id="alertStatus">
                  <option value="Open">Open</option>
                  <option value="Acknowledged">Acknowledged</option>
                  <option value="Resolved">Resolved</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Related Load</label>
                <select class="form-select" id="alertLoad">
                  <option value="">None</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Related Driver</label>
                <select class="form-select" id="alertDriver">
                  <option value="">None</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Due Date</label>
                <input type="datetime-local" class="form-control" id="alertDueDate">
              </div>
              <div class="col-12">
                <label class="form-label">Description</label>
                <textarea class="form-control" id="alertDescription" rows="3" placeholder="Describe the alert…"></textarea>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-nd" id="saveAlertBtn">
            <i class="bi bi-check-lg me-1"></i>Save Alert
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/airtable.js"></script>
  <script src="js/app.js"></script>
  <script src="js/alerts.js"></script>
</body>
</html>
