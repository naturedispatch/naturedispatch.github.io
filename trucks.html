<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trucks & Trailers — Nature Dispatch TMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div id="app"></div>

  <!-- Truck Modal -->
  <div class="modal fade" id="truckModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="truckModalTitle">New Truck</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="truckForm">
            <input type="hidden" id="truckRecordId">
            <div class="mb-3">
              <label class="form-label">Truck Number *</label>
              <input type="text" class="form-control" id="truckNumber" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Company *</label>
              <select class="form-select" id="truckCompany" required><option value="">Select…</option></select>
            </div>
            <div class="mb-3">
              <label class="form-label">VIN / Plate</label>
              <input type="text" class="form-control" id="truckVin">
            </div>
            <div class="mb-3">
              <label class="form-label">Status</label>
              <select class="form-select" id="truckStatus">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
                <option value="In Maintenance">In Maintenance</option>
              </select>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-nd" id="saveTruckBtn"><i class="bi bi-check-lg me-1"></i>Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/airtable.js"></script>
  <script src="js/app.js"></script>
  <script src="js/trucks.js"></script>
</body>
</html>
