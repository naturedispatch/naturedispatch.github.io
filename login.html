<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Nature Dispatch TMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/nd-effects.css" rel="stylesheet">
</head>
<body class="login-body">

  <!-- Animated Three.js Tubes Background (inspired by Tubes Cursor Animation example) -->
  <canvas id="loginCanvas"></canvas>

  <div class="login-container">
    <!-- Brand -->
    <div class="text-center mb-4">
      <div class="login-logo mx-auto mb-3">
        <i class="bi bi-truck-front" style="font-size:1.6rem;color:#fff"></i>
      </div>
      <h3 class="fw-bold mb-1">Nature Dispatch</h3>
      <p class="text-muted" style="font-size:.85rem">Transportation Management System</p>
    </div>

    <!-- Login Form -->
    <div class="login-card" id="loginCard">
      <h5 class="fw-bold mb-3">Sign In</h5>
      <form id="loginForm" autocomplete="off">
        <div class="mb-3">
          <label class="form-label fw-semibold" style="font-size:.82rem">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="loginEmail" placeholder="you@company.com" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold" style="font-size:.82rem">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
          </div>
        </div>
        <div id="loginError" class="alert alert-danger py-2 d-none" style="font-size:.82rem"></div>
        <button type="submit" class="btn btn-nd w-100 mt-2" id="loginBtn">
          <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
        </button>
      </form>
    </div>

    <!-- Setup Form (first-time only) -->
    <div class="login-card d-none" id="setupCard">
      <h5 class="fw-bold mb-1">Welcome!</h5>
      <p class="text-muted mb-3" style="font-size:.82rem">No users found. Create the first Admin account.</p>
      <form id="setupForm" autocomplete="off">
        <div class="mb-3">
          <label class="form-label fw-semibold" style="font-size:.82rem">Full Name</label>
          <input type="text" class="form-control" id="setupName" placeholder="John Doe" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold" style="font-size:.82rem">Email</label>
          <input type="email" class="form-control" id="setupEmail" placeholder="admin@company.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold" style="font-size:.82rem">Password</label>
          <input type="password" class="form-control" id="setupPassword" placeholder="Choose a strong password" required minlength="4">
        </div>
        <div id="setupError" class="alert alert-danger py-2 d-none" style="font-size:.82rem"></div>
        <button type="submit" class="btn btn-nd w-100 mt-2" id="setupBtn">
          <i class="bi bi-person-plus me-1"></i> Create Admin Account
        </button>
      </form>
    </div>

    <div class="text-center mt-3">
      <small class="text-muted">&copy; 2026 Nature Dispatch TMS</small>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/airtable.js"></script>
  <script src="js/login.js"></script>
  <!-- Tubes Background Animation -->
  <script type="module">
    import TubesCursor from "https://cdn.jsdelivr.net/npm/threejs-components@0.0.19/build/cursors/tubes1.min.js";
    try {
      const canvas = document.getElementById('loginCanvas');
      if (canvas) {
        const app = TubesCursor(canvas, {
          tubes: {
            colors: ["#52b788", "#2d6a4f", "#1b4332"],
            lights: {
              intensity: 150,
              colors: ["#6ee7b7", "#34d399", "#52b788", "#2d6a4f"]
            }
          }
        });
      }
    } catch(e) { console.warn('Tubes animation unavailable:', e); }
  </script>
</body>
</html>
