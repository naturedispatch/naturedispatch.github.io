<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loads — Nature Dispatch TMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div id="app"></div>

  <!-- Create / Edit Load Modal -->
  <div class="modal fade" id="loadModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="loadModalTitle">New Load</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="loadForm">
            <input type="hidden" id="loadRecordId">
            <div class="row g-3">
              <!-- Row 1: Core identifiers -->
              <div class="col-md-4">
                <label class="form-label">Load Number *</label>
                <input type="text" class="form-control" id="loadNumber" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Company *</label>
                <select class="form-select" id="loadCompany" required>
                  <option value="">Select…</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Status</label>
                <select class="form-select" id="loadStatus">
                  <option value="New">New</option>
                  <option value="Dispatched">Dispatched</option>
                  <option value="In Transit">In Transit</option>
                  <option value="Delivered">Delivered</option>
                  <option value="Invoiced">Invoiced</option>
                  <option value="Paid">Paid</option>
                  <option value="Cancelled">Cancelled</option>
                </select>
              </div>
              <!-- Row 2: Assignments -->
              <div class="col-md-4">
                <label class="form-label">Broker</label>
                <select class="form-select" id="loadBroker">
                  <option value="">Select…</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Driver</label>
                <select class="form-select" id="loadDriver">
                  <option value="">Select…</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Truck</label>
                <select class="form-select" id="loadTruck">
                  <option value="">Select…</option>
                </select>
              </div>
              <!-- Row 3: Dates & ETA -->
              <div class="col-md-3">
                <label class="form-label">Pickup Date</label>
                <input type="datetime-local" class="form-control" id="loadPickupDate">
              </div>
              <div class="col-md-3">
                <label class="form-label">Delivery Date</label>
                <input type="datetime-local" class="form-control" id="loadDeliveryDate">
              </div>
              <div class="col-md-3">
                <label class="form-label">ETA</label>
                <input type="datetime-local" class="form-control" id="loadETA">
              </div>
              <div class="col-md-3">
                <label class="form-label">Invoice Status</label>
                <select class="form-select" id="loadInvoiceStatus">
                  <option value="">Select…</option>
                  <option value="Not Ready">Not Ready</option>
                  <option value="Docs Missing">Docs Missing</option>
                  <option value="Ready to Invoice">Ready to Invoice</option>
                  <option value="Invoiced">Invoiced</option>
                  <option value="Paid">Paid</option>
                  <option value="Disputed">Disputed</option>
                </select>
              </div>
              <!-- Row 4: Revenue & Miles -->
              <div class="col-md-6">
                <label class="form-label">Revenue ($)</label>
                <input type="number" step="0.01" class="form-control" id="loadRevenue">
              </div>
              <div class="col-md-6">
                <label class="form-label">Miles</label>
                <input type="number" class="form-control" id="loadMiles">
              </div>
              <!-- Row 5: Document Uploads -->
              <div class="col-12">
                <label class="form-label">Documents</label>
                <div class="row g-2" id="loadDocsSection">
                  <div class="col-md-4">
                    <div class="doc-upload-box" id="boxRateCon">
                      <div class="doc-upload-content" id="docRateCon">
                        <i class="bi bi-cloud-arrow-up doc-upload-icon"></i>
                        <div class="doc-upload-label">Rate Con</div>
                        <div class="doc-upload-hint">Click to upload</div>
                      </div>
                      <input type="file" class="d-none" id="fileRateCon" data-label="Rate Con" accept=".pdf,.png,.jpg,.jpeg,.doc,.docx">
                    </div>
                  </div>
                  <div class="col-md-4">
                    <div class="doc-upload-box" id="boxBOL">
                      <div class="doc-upload-content" id="docBOL">
                        <i class="bi bi-cloud-arrow-up doc-upload-icon"></i>
                        <div class="doc-upload-label">BOL</div>
                        <div class="doc-upload-hint">Click to upload</div>
                      </div>
                      <input type="file" class="d-none" id="fileBOL" data-label="BOL" accept=".pdf,.png,.jpg,.jpeg,.doc,.docx">
                    </div>
                  </div>
                  <div class="col-md-4">
                    <div class="doc-upload-box" id="boxInvoice">
                      <div class="doc-upload-content" id="docInvoice">
                        <i class="bi bi-cloud-arrow-up doc-upload-icon"></i>
                        <div class="doc-upload-label">Invoice</div>
                        <div class="doc-upload-hint">Click to upload</div>
                      </div>
                      <input type="file" class="d-none" id="fileInvoice" data-label="Invoice" accept=".pdf,.png,.jpg,.jpeg,.doc,.docx">
                    </div>
                  </div>
                </div>
              </div>
              <div class="col-12">
                <label class="form-label">Notes</label>
                <textarea class="form-control" id="loadNotes" rows="2" placeholder="Operational notes…"></textarea>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-nd" id="saveLoadBtn">
            <i class="bi bi-check-lg me-1"></i>Save Load
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Load Stops Modal -->
  <div class="modal fade" id="stopsModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Load Stops — <span id="stopsLoadNum"></span></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="stopsBody">
          <!-- Stops are rendered dynamically -->
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button class="btn btn-nd" id="addStopBtn"><i class="bi bi-plus-lg me-1"></i>Add Stop</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/airtable.js"></script>
  <script src="js/app.js"></script>
  <script src="js/csv.js"></script>
  <script src="js/loads.js"></script>
</body>
</html>
