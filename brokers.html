<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brokers — Nature Dispatch TMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/nd-effects.css" rel="stylesheet">
</head>
<body>
  <div id="app"></div>

  <!-- Broker Modal -->
  <div class="modal fade" id="brokerModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="brokerModalTitle">New Broker</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="brokerForm">
            <input type="hidden" id="brokerRecordId">
            <div class="mb-3">
              <label class="form-label">Broker Name *</label>
              <input type="text" class="form-control" id="brokerName" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Main Phone</label>
              <input type="tel" class="form-control" id="brokerPhone">
            </div>
            <div class="mb-3">
              <label class="form-label">Contact Email</label>
              <input type="email" class="form-control" id="brokerEmail">
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-nd" id="saveBrokerBtn"><i class="bi bi-check-lg me-1"></i>Save</button>
        </div>
      </div>
    </div>
  </div>

    <script src="https://unpkg.co/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/airtable.js"></script>
  <script src="js/app.js"></script>
  <script src="js/csv.js"></script>
  <script src="js/brokers.js"></script>
  <script src="js/nd-effects.js"></script>
</body>
</html>
